<router-outlet></router-outlet>

@if (sharedService.toast(); as toast) {
  <div class="position-fixed top-0 end-0 p-3" style="z-index: 9999">
    <div class="app-toast" [class]="toast.type">
      <span class="app-toast-icon">
        @switch (toast.type) {
          @case ('success') { &#x2714;&#xFE0E; }
          @case ('danger')  { &#x2716;&#xFE0E; }
          @case ('warning') { &#x26A0;&#xFE0E; }
          @default          { &#x2139;&#xFE0E; }
        }
      </span>
      <span class="app-toast-body">{{ toast.message }}</span>
      <button class="app-toast-close" (click)="sharedService.clearToast()" title="Fermer">&#x2715;</button>
    </div>
  </div>
}
